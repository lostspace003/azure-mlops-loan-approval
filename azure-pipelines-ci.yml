# azure-pipelines-ci.yml
trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/*
      - pipelines/*
      - environments/*

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: SUBSCRIPTION_ID
    value: '2f55ca6d-7f38-4220-919c-591a66eb1a2b'
  - name: RESOURCE_GROUP
    value: 'rg-mlops-loan-approval'
  - name: WORKSPACE_NAME
    value: 'mlw-loan-approval-v2'
  - name: python.version
    value: '3.9'

stages:
  - stage: Lint_and_Test
    displayName: 'Code Quality & Unit Tests'
    jobs:
      - job: LintAndTest
        displayName: 'Lint, Format, Test'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(python.version)'
              addToPath: true

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
              pip install flake8 pytest pytest-cov
            displayName: 'Install dependencies'

          - script: |
              flake8 src/ --count --select=E9,F63,F7,F82 --show-source
              flake8 src/ --count --max-line-length=120 --statistics
            displayName: 'Lint with flake8'

          - script: |
              pytest tests/ -v --cov=src --cov-report=xml
            displayName: 'Run unit tests'

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/test-results.xml'

  - stage: Train_Model
    displayName: 'Submit AML Training Pipeline'
    dependsOn: Lint_and_Test
    condition: succeeded()
    jobs:
      - job: TrainModel
        displayName: 'Train and Register Model'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(python.version)'
              addToPath: true

          - script: |
              pip install azure-ai-ml azure-identity
            displayName: 'Install Azure ML SDK v2'

          - task: AzureCLI@2
            displayName: 'Submit Training Pipeline'
            inputs:
              azureSubscription: 'azure-ml-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                python pipelines/training_pipeline.py
            env:
              SUBSCRIPTION_ID: $(SUBSCRIPTION_ID)
              RESOURCE_GROUP: $(RESOURCE_GROUP)
              WORKSPACE_NAME: $(WORKSPACE_NAME)
